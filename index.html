<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>imagenes chistosas</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: #0f0f0f;
      color: #e0e0e0;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 2px solid #4a90d9;
      position: sticky;
      top: 0;
      z-index: 50;
    }

    header h1 {
      color: #4a90d9;
      font-size: 1.6rem;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    #auth-buttons { display: flex; gap: 10px; align-items: center; }

    button {
      background: #4a90d9;
      color: white;
      border: none;
      padding: 8px 18px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: background 0.2s;
    }

    button:hover { background: #357abd; }
    button.secondary { background: transparent; border: 1px solid #4a90d9; color: #4a90d9; }
    button.secondary:hover { background: #4a90d920; }
    button.danger { background: #c0392b; }
    button.danger:hover { background: #a93226; }

    .container { max-width: 1100px; margin: 0 auto; padding: 32px 16px; }

    .section-title {
      font-size: 1.2rem;
      color: #4a90d9;
      margin-bottom: 20px;
      border-left: 4px solid #4a90d9;
      padding-left: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: #000000aa;
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.active { display: flex; }

    .modal {
      background: #1a1a2e;
      border: 1px solid #4a90d9;
      border-radius: 10px;
      padding: 32px;
      width: 100%;
      max-width: 420px;
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal h2 { color: #4a90d9; margin-bottom: 20px; }

    .modal input, .modal textarea {
      width: 100%;
      padding: 10px 14px;
      margin-bottom: 14px;
      background: #0f0f0f;
      border: 1px solid #333;
      border-radius: 6px;
      color: #e0e0e0;
      font-size: 0.95rem;
      font-family: 'Segoe UI', sans-serif;
    }

    .modal input:focus, .modal textarea:focus { outline: none; border-color: #4a90d9; }

    .modal textarea { resize: vertical; min-height: 80px; }

    .file-input-label {
      display: block;
      padding: 10px 14px;
      background: #0f0f0f;
      border: 1px dashed #4a90d9;
      border-radius: 6px;
      color: #888;
      cursor: pointer;
      margin-bottom: 14px;
      text-align: center;
      transition: border-color 0.2s;
    }

    .file-input-label:hover { border-color: #357abd; color: #4a90d9; }
    .file-input-label input { display: none; }

    .modal-buttons { display: flex; gap: 10px; margin-top: 8px; }
    .error-msg { color: #e74c3c; font-size: 0.85rem; margin-bottom: 10px; }
    .success-msg { color: #2ecc71; font-size: 0.85rem; margin-bottom: 10px; }

    .posts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }

    .post-card {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 10px;
      overflow: hidden;
      transition: border-color 0.2s, transform 0.2s;
    }

    .post-card:hover { border-color: #4a90d9; transform: translateY(-3px); }

    .post-card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      display: block;
    }

    .post-card-body { padding: 14px; }
    .post-card h3 { color: #ffffff; margin-bottom: 6px; font-size: 1rem; }
    .post-card .description { color: #888; font-size: 0.85rem; margin-bottom: 6px; overflow: hidden; max-height: 60px; transition: max-height 0.3s ease; word-break: break-all; }
    .post-card .owner { color: #4a90d9; font-size: 0.8rem; margin-bottom: 10px; }
    .post-card-buttons { display: flex; gap: 8px; }
    .post-card-buttons button { padding: 6px 12px; font-size: 0.8rem; }

    .add-post-btn { margin-bottom: 24px; padding: 10px 24px; font-size: 1rem; }
    #user-info { color: #4a90d9; font-size: 0.9rem; }
    .empty-msg { color: #555; text-align: center; padding: 40px; grid-column: 1/-1; }

    /* Lightbox */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: #000000ee;
      z-index: 200;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }

    .lightbox.active { display: flex; }

    .lightbox img {
      max-width: 90vw;
      max-height: 80vh;
      border-radius: 8px;
      object-fit: contain;
    }

    .lightbox-close {
      position: absolute;
      top: 20px;
      right: 28px;
      font-size: 2rem;
      color: white;
      cursor: pointer;
    }

    @media (max-width: 600px) {
      header { flex-direction: column; align-items: flex-start; gap: 12px; padding: 16px; }
      header h1 { font-size: 1.2rem; }
      #auth-buttons { width: 100%; justify-content: flex-end; }
      .container { padding: 16px 12px; }
      .posts-grid { grid-template-columns: 1fr; }
      .modal { margin: 16px; padding: 24px 16px; }
      .add-post-btn { width: 100%; }
    }
  </style>
</head>
<body>

<header>
  <h1>imagenes chistosas</h1>
  <div id="auth-buttons">
    <button onclick="openModal('login-modal')">Iniciar Sesión</button>
    <button class="secondary" onclick="openModal('register-modal')">Registrarse</button>
  </div>
</header>

<div class="container">
  <div id="add-post-section" style="display:none">
    <button class="add-post-btn" onclick="openModal('post-modal')">+ Subir imagen</button>
  </div>
  <div class="section-title">Feed</div>
  <div id="posts-grid" class="posts-grid">
    <div class="empty-msg">Cargando...</div>
  </div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <span class="lightbox-close">✕</span>
  <img id="lightbox-img" src="" alt="">
</div>

<!-- Modal Login -->
<div class="modal-overlay" id="login-modal">
  <div class="modal">
    <h2>Iniciar Sesión</h2>
    <div id="login-error" class="error-msg"></div>
    <input type="text" id="login-username" placeholder="Usuario" autocomplete="off">
    <input type="password" id="login-password" placeholder="Contraseña" autocomplete="new-password">
    <div class="modal-buttons">
      <button onclick="login()">Entrar</button>
      <button class="secondary" onclick="closeModal('login-modal')">Cancelar</button>
    </div>
  </div>
</div>

<!-- Modal Registro -->
<div class="modal-overlay" id="register-modal">
  <div class="modal">
    <h2>Registrarse</h2>
    <div id="register-error" class="error-msg"></div>
    <div id="register-success" class="success-msg"></div>
    <input type="text" id="register-username" placeholder="Usuario">
    <input type="password" id="register-password" placeholder="Contraseña">
    <div class="modal-buttons">
      <button onclick="register()">Crear cuenta</button>
      <button class="secondary" onclick="closeModal('register-modal')">Cancelar</button>
    </div>
  </div>
</div>

<!-- Modal Subir Post -->
<div class="modal-overlay" id="post-modal">
  <div class="modal">
    <h2 id="post-modal-title">Subir imagen</h2>
    <div id="post-error" class="error-msg"></div>
    <input type="text" id="post-title" placeholder="Título">
    <textarea id="post-description" placeholder="Descripción (opcional)"></textarea>
    <label class="file-input-label" id="file-label" for="post-image">
      📁 Seleccionar imagen
    </label>
    <input type="file" id="post-image" accept="image/*" onchange="updateFileLabel(this)" style="display:none">
    <div class="modal-buttons">
      <button onclick="savePost()">Publicar</button>
      <button class="secondary" onclick="closeModal('post-modal')">Cancelar</button>
    </div>
  </div>
</div>

<script>
  const API = window.location.origin;
  let token = localStorage.getItem("token");
  let currentUserId = parseInt(localStorage.getItem("user_id"));

  if (token) showLoggedIn();
  loadPosts();

  function openModal(id) {
    document.getElementById(id).classList.add("active");
    if (id === "login-modal") {
      document.getElementById("login-username").value = "";
      document.getElementById("login-password").value = "";
    }
  }

  function closeModal(id) {
    document.getElementById(id).classList.remove("active");
  }

  function showLoggedIn() {
    const username = localStorage.getItem("username");
    document.getElementById("auth-buttons").innerHTML = `
      <span id="user-info">✓ ${username}</span>
      <button class="secondary" onclick="logout()">Cerrar sesión</button>`;
    document.getElementById("add-post-section").style.display = "block";
  }

  function logout() {
    localStorage.removeItem("token");
    localStorage.removeItem("user_id");
    localStorage.removeItem("username");
    token = null;
    currentUserId = null;
    document.getElementById("auth-buttons").innerHTML = `
      <button onclick="openModal('login-modal')">Iniciar Sesión</button>
      <button class="secondary" onclick="openModal('register-modal')">Registrarse</button>`;
    document.getElementById("add-post-section").style.display = "none";
    loadPosts();
  }

  async function register() {
    const username = document.getElementById("register-username").value;
    const password = document.getElementById("register-password").value;
    document.getElementById("register-error").textContent = "";
    document.getElementById("register-success").textContent = "";

    if (!username || !password) {
      document.getElementById("register-error").textContent = "Por favor completa todos los campos.";
      return;
    }

    const res = await fetch(`${API}/users/register`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username, password })
    });

    if (res.ok) {
      document.getElementById("register-success").textContent = "¡Cuenta creada exitosamente!";
      document.getElementById("register-username").value = "";
      document.getElementById("register-password").value = "";
      setTimeout(() => {
        closeModal("register-modal");
        document.getElementById("register-success").textContent = "";
      }, 1500);
    } else {
      const data = await res.json();
      document.getElementById("register-error").textContent = data.detail;
    }
  }

  async function login() {
    const username = document.getElementById("login-username").value;
    const password = document.getElementById("login-password").value;
    document.getElementById("login-error").textContent = "";

    const form = new FormData();
    form.append("username", username);
    form.append("password", password);

    const res = await fetch(`${API}/users/login`, { method: "POST", body: form });

    if (res.ok) {
      const data = await res.json();
      token = data.access_token;
      currentUserId = data.user_id;
      localStorage.setItem("token", token);
      localStorage.setItem("user_id", data.user_id);
      localStorage.setItem("username", username);
      closeModal("login-modal");
      showLoggedIn();
      loadPosts();
    } else {
      document.getElementById("login-error").textContent = "Usuario o contraseña incorrectos";
    }
  }

  async function loadPosts() {
    const res = await fetch(`${API}/posts/`);
    const posts = await res.json();
    const grid = document.getElementById("posts-grid");

    if (posts.length === 0) {
      grid.innerHTML = `<div class="empty-msg">No hay publicaciones todavía.</div>`;
      return;
    }

    grid.innerHTML = posts.map(post => `
      <div class="post-card">
        <img src="${API}/${post.image_path}" alt="${post.title}" onclick="openLightbox('${API}/${post.image_path}')" style="cursor:pointer">
        <div class="post-card-body">
          <h3>${post.title}</h3>
          ${post.description ? `
          <div class="description" id="desc-${post.id}" style="overflow:hidden; max-height:60px">${post.description}</div>
          ${post.description.length > 100 ? `<span style="color:#4a90d9; font-size:0.8rem; cursor:pointer" onclick="toggleDesc(${post.id})">Ver más</span>` : ""}
        ` : ""}
          ${token && post.owner_id === currentUserId ? `
          <div class="post-card-buttons">
            <button class="danger" onclick="deletePost(${post.id})">Eliminar</button>
          </div>` : ""}
        </div>
      </div>
    `).join("");
  }

  function updateFileLabel(input) {
    const label = document.getElementById("file-label");
    if (input.files && input.files[0]) {
      label.textContent = `✓ ${input.files[0].name}`;
    }
  }

  async function savePost() {
    const title = document.getElementById("post-title").value;
    const description = document.getElementById("post-description").value;
    const imageInput = document.getElementById("post-image");
    const imageFile = imageInput ? imageInput.files[0] : null;
    document.getElementById("post-error").textContent = "";

    if (!title || !imageFile) {
      document.getElementById("post-error").textContent = "El título y la imagen son obligatorios.";
      return;
    }

    const formData = new FormData();
    formData.append("title", title);
    if (description) formData.append("description", description);
    formData.append("image", imageFile);

    const res = await fetch(`${API}/posts/`, {
      method: "POST",
      headers: { "Authorization": `Bearer ${token}` },
      body: formData
    });

    if (res.ok) {
      closeModal("post-modal");
      document.getElementById("post-title").value = "";
      document.getElementById("post-description").value = "";
      document.getElementById("post-image").value = "";
      document.getElementById("file-label").textContent = "📁 Seleccionar imagen";
      loadPosts();
    } else {
      document.getElementById("post-error").textContent = "Error al publicar.";
    }
  }

  async function deletePost(id) {
    if (!confirm("¿Seguro que quieres eliminar esta publicación?")) return;
    await fetch(`${API}/posts/${id}`, {
      method: "DELETE",
      headers: { "Authorization": `Bearer ${token}` }
    });
    loadPosts();
  }

  function openLightbox(src) {
    document.getElementById("lightbox-img").src = src;
    document.getElementById("lightbox").classList.add("active");
  }

  function closeLightbox() {
    document.getElementById("lightbox").classList.remove("active");
  }
  function toggleDesc(id) {
  const desc = document.getElementById(`desc-${id}`);
  const btn = desc.nextElementSibling;
  if (desc.style.maxHeight === "" || desc.style.maxHeight === "60px") {
    desc.style.maxHeight = desc.scrollHeight + "px";
    btn.textContent = "Ver menos";
  } else {
    desc.style.maxHeight = "60px";
    btn.textContent = "Ver más";
  }
}
</script>
</body>
</html>
